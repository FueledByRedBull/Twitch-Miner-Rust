name: Bug report
description: Report a reproducible Rust miner defect without credentials or raw logs.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include cookies, OAuth tokens, Discord webhooks, config values, or raw logs."
  - type: input
    id: revision
    attributes:
      label: Source revision or image digest
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Commands and synthetic inputs only.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed credentials, user identifiers, webhook URLs, and raw log/config contents.
          required: true
