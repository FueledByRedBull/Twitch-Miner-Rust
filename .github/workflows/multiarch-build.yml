name: Multiarch Build

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  rust-qa:
    permissions:
      contents: read
    uses: ./.github/workflows/rust-qa.yml

  build:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: rust-qa
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64
          - platform: linux/arm/v7
            platform_tag: arm-v7
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - id: build_metadata
        run: |
          "time=$(git show -s --format=%cI $env:GITHUB_SHA)" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - id: image
        run: |
          "name=ghcr.io/$($env:GITHUB_REPOSITORY.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=multiarch-${{ matrix.platform_tag }}
          cache-to: type=gha,mode=max,scope=multiarch-${{ matrix.platform_tag }}
          build-args: |
            BUILD_REVISION=${{ github.sha }}
            BUILD_TIME=${{ steps.build_metadata.outputs.time }}
          provenance: mode=max
          sbom: true
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Smoke test image
        run: |
          docker run --rm --platform "${{ matrix.platform }}" "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" --help
          $version = docker run --rm --platform "${{ matrix.platform }}" "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" --version 2>&1
          if ($LASTEXITCODE -ne 0 -or ($version -join "`n") -notmatch 'built [^)]+' ) {
            throw "Version metadata smoke test failed for ${{ matrix.platform }}: $($version -join ' ')"
          }
          $health = docker run --rm --platform "${{ matrix.platform }}" "${{ steps.image.outputs.name }}@${{ steps.build.outputs.digest }}" --health 2>&1
          if ($LASTEXITCODE -eq 0) {
            throw 'Health validation unexpectedly passed without a runtime status file.'
          }
          if (($health -join "`n") -notmatch 'runtime[- ]status|runtime status') {
            throw "Health validation failed for an unexpected reason on ${{ matrix.platform }}: $($health -join ' ')"
          }
          exit 0
        shell: pwsh

      - name: Export digest
        run: |
          New-Item -ItemType Directory -Path "$env:RUNNER_TEMP/digests" -Force | Out-Null
          $digest = "${{ steps.build.outputs.digest }}"
          New-Item -ItemType File -Path "$env:RUNNER_TEMP/digests/$($digest.Replace('sha256:',''))" -Force | Out-Null
        shell: pwsh
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        id: digest_file

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: digests-${{ matrix.platform_tag }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error

  manifest:
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - id: image
        run: |
          "name=ghcr.io/$($env:GITHUB_REPOSITORY.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=long
            type=ref,event=tag
            type=ref,event=branch

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - id: manifest
        name: Create manifest list
        run: |
          $images = Get-ChildItem '${{ runner.temp }}/digests' -File | ForEach-Object {
            "${{ steps.image.outputs.name }}@sha256:$($_.BaseName)"
          }
          if (-not $images) {
            throw 'No image digests were produced.'
          }
          New-Item -ItemType Directory -Path '${{ runner.temp }}/manifest' -Force | Out-Null
          $metadata = '${{ runner.temp }}/manifest/metadata.json'
          $tags = ($env:IMAGE_TAGS -split "\r?\n") | Where-Object { $_ }
          for ($index = 0; $index -lt $tags.Count; $index++) {
            $arguments = @('buildx', 'imagetools', 'create', '--tag', $tags[$index])
            if ($index -eq 0) {
              $arguments += '--metadata-file', $metadata
            }
            $arguments += $images
            docker @arguments
          }
          $manifestInfo = Get-Content -Raw $metadata | ConvertFrom-Json
          $digest = $manifestInfo.'containerimage.descriptor'.digest
          if ($digest -notmatch '^sha256:[0-9a-f]{64}$') {
            throw 'Manifest publication did not provide a valid digest.'
          }
          "digest=$digest" >> $env:GITHUB_OUTPUT
        shell: pwsh
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}

      - name: Smoke test published manifest digest
        shell: pwsh
        run: |
          $image = '${{ steps.image.outputs.name }}'
          $digest = '${{ steps.manifest.outputs.digest }}'
          $verified = ./scripts/verify-published-manifest.ps1 `
            -ImageReference "$image@$digest" `
            -ExpectedDigest $digest `
            -ExpectedRevision '${{ github.sha }}'
          if ($verified -ne $digest) {
            throw "Published manifest verification returned unexpected digest $verified."
          }
          Set-Content -Path '${{ runner.temp }}/manifest/digest.txt' -Value $digest -NoNewline
          exit 0

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: published-manifest-digest
          path: ${{ runner.temp }}/manifest/digest.txt
          if-no-files-found: error

  release-manifest:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    needs: rust-qa
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - id: image
        run: |
          "name=ghcr.io/$($env:GITHUB_REPOSITORY.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: promote
        name: Promote tested commit manifest
        shell: pwsh
        run: |
          $image = '${{ steps.image.outputs.name }}'
          $source = "${image}:sha-${{ github.sha }}"
          $digest = ./scripts/verify-published-manifest.ps1 `
            -ImageReference $source `
            -ExpectedRevision '${{ github.sha }}'

          $release = "${image}:${{ github.ref_name }}"
          docker buildx imagetools create --tag $release "$image@$digest"
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to promote $source to $release."
          }

          $promoted = ./scripts/verify-published-manifest.ps1 `
            -ImageReference $release `
            -ExpectedDigest $digest `
            -ExpectedRevision '${{ github.sha }}'
          if ($promoted -ne $digest) {
            throw "Release tag resolved to $promoted instead of tested digest $digest."
          }

          New-Item -ItemType Directory -Path '${{ runner.temp }}/manifest' -Force | Out-Null
          Set-Content -Path '${{ runner.temp }}/manifest/digest.txt' -Value $digest -NoNewline
          "digest=$digest" >> $env:GITHUB_OUTPUT

      - name: Attest release manifest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.promote.outputs.digest }}
          push-to-registry: true

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: published-manifest-digest
          path: ${{ runner.temp }}/manifest/digest.txt
          if-no-files-found: error
