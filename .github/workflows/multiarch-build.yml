name: Multiarch Build

concurrency:
  group: multiarch-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha,scope=multiarch-amd64
          cache-to: type=gha,mode=max,scope=multiarch-amd64
          provenance: false
          sbom: false

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64
          - platform: linux/arm/v7
            platform_tag: arm-v7
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - if: matrix.platform != 'linux/amd64'
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - id: image
        run: |
          "name=ghcr.io/$($env:GITHUB_REPOSITORY.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=multiarch-${{ matrix.platform_tag }}
          cache-to: type=gha,mode=max,scope=multiarch-${{ matrix.platform_tag }}
          provenance: false
          sbom: false
          outputs: type=image,name=${{ steps.image.outputs.name }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          New-Item -ItemType Directory -Path "$env:RUNNER_TEMP/digests" -Force | Out-Null
          $digest = "${{ steps.build.outputs.digest }}"
          New-Item -ItemType File -Path "$env:RUNNER_TEMP/digests/$($digest.Replace('sha256:',''))" -Force | Out-Null
        shell: pwsh
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        id: digest_file

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_tag }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@v3

      - id: image
        run: |
          "name=ghcr.io/$($env:GITHUB_REPOSITORY.ToLowerInvariant())" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=ref,event=branch

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Create manifest list
        run: |
          $images = Get-ChildItem '${{ runner.temp }}/digests' -File | ForEach-Object {
            "${{ steps.image.outputs.name }}@sha256:$($_.BaseName)"
          }
          if (-not $images) {
            throw 'No image digests were produced.'
          }
          $tags = ($env:IMAGE_TAGS -split "\r?\n") | Where-Object { $_ }
          foreach ($tag in $tags) {
            docker buildx imagetools create --tag $tag @images
          }
        shell: pwsh
        env:
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
