services:
  twitch-miner:
    build:
      context: .
      dockerfile: Dockerfile
    user: "${UID:-1000}:${GID:-1000}"
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    read_only: true
    healthcheck:
      test: ["CMD", "/twitch-miner", "--health"]
      interval: 60s
      timeout: 5s
      start_period: 90s
      retries: 3
    environment:
      TCPM_CONFIG: /data/config.json
      TCPM_DATA_DIR: /data
    volumes:
      - ./data:/data
